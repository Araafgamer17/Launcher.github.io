<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Assets Registry</title></head>
<body>
    <script>
        window.getAssetsMetadata = function() {
            return {
                assetsBaseUrl: "https://resources.download.minecraft.net",
                parseObjects: function(objects) {
                    let assetList = [];
                    Object.entries(objects).forEach(([filepath, meta]) => {
                        const hash = meta.hash;
                        const prefix = hash.substring(0, 2);
                        assetList.push({
                            display: `objects/${prefix}/${hash} (${filepath})`,
                            url: `https://resources.download.minecraft.net/${prefix}/${hash}`
                        });
                    });
                    return assetList;
                }
            };
        };
    </script>
</body>
</html>
